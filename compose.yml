# Chorus — Phase 1 local runtime stack
#
# Services declared here form the runtime substrate. Implementation of
# Lighthouse (workflows, agents, gateway, connectors, BFF, UI) lands
# during Phase 1A and composes alongside.
#
# All connectors are backed by real software in sandbox/local mode (no
# mocks, no hand-rolled fakes per project policy).
#
# Every credential, port, image tag, and bind-mount permission is
# parameterised through `.env` (see `.env.example`). Use `scripts/dc`
# instead of bare `docker compose` so UID/GID and `.env` are sourced
# consistently.

services:

  # ---------------------------------------------------------------------------
  # chown-init — one-shot helper that fixes ownership on bind-mounted host
  # paths so files created inside containers stay owned by the host user.
  # Services that bind-mount workspace directories should depend on this with
  # `condition: service_completed_successfully` (see otel-collector below).
  # ---------------------------------------------------------------------------
  chown-init:
    image: alpine:3.20
    restart: "no"
    user: "0:0"
    environment:
      TARGET_UID: ${UID:-1000}
      TARGET_GID: ${GID:-1000}
    volumes:
      - .:/workspace
    command:
      - sh
      - -ceu
      - |
        mkdir -p /workspace/infrastructure/otel /workspace/tmp
        for root in /workspace/infrastructure /workspace/tmp; do
          [ -d "$$root" ] || continue
          find "$$root" -xdev \( -user 0 -o -group 0 \) -exec chown "$$TARGET_UID:$$TARGET_GID" {} + || true
        done

  postgres:
    image: ${CHORUS_PG_IMAGE:-postgres:17-alpine}
    environment:
      POSTGRES_USER: ${CHORUS_PG_USER:-chorus}
      POSTGRES_PASSWORD: ${CHORUS_PG_PASSWORD:-chorus}
      POSTGRES_DB: ${CHORUS_PG_DB:-chorus}
    ports:
      - "${CHORUS_PG_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CHORUS_PG_USER:-chorus}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redpanda:
    image: ${REDPANDA_IMAGE:-docker.redpanda.com/redpandadata/redpanda:latest}
    command:
      - redpanda
      - start
      - --smp=1
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr=INTERNAL://redpanda:9092,EXTERNAL://localhost:${REDPANDA_KAFKA_PORT:-9092}
      - --schema-registry-addr=0.0.0.0:8081
    ports:
      - "${REDPANDA_KAFKA_PORT:-9092}:19092"              # Kafka API
      - "${REDPANDA_SCHEMA_REGISTRY_PORT:-8081}:8081"     # Schema Registry
      - "${REDPANDA_ADMIN_PORT:-9644}:9644"               # Admin API
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda-console:
    image: ${REDPANDA_CONSOLE_IMAGE:-docker.redpanda.com/redpandadata/console:latest}
    environment:
      KAFKA_BROKERS: redpanda:9092
      KAFKA_SCHEMAREGISTRY_ENABLED: "true"
      KAFKA_SCHEMAREGISTRY_URLS: http://redpanda:8081
    ports:
      - "${REDPANDA_CONSOLE_PORT:-8080}:8080"
    depends_on:
      - redpanda

  temporal-postgres:
    image: ${TEMPORAL_PG_IMAGE:-postgres:17-alpine}
    environment:
      POSTGRES_USER: ${TEMPORAL_PG_USER:-temporal}
      POSTGRES_PASSWORD: ${TEMPORAL_PG_PASSWORD:-temporal}
      POSTGRES_DB: ${TEMPORAL_PG_DB:-temporal}
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TEMPORAL_PG_USER:-temporal}"]
      interval: 5s
      timeout: 3s
      retries: 10

  temporal:
    image: ${TEMPORAL_IMAGE:-temporalio/auto-setup:latest}
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${TEMPORAL_PG_USER:-temporal}
      POSTGRES_PWD: ${TEMPORAL_PG_PASSWORD:-temporal}
      POSTGRES_SEEDS: temporal-postgres
    ports:
      - "${TEMPORAL_PORT:-7233}:7233"
    depends_on:
      temporal-postgres:
        condition: service_healthy

  temporal-ui:
    image: ${TEMPORAL_UI_IMAGE:-temporalio/ui:latest}
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000,http://localhost:${FRONTEND_PORT:-5173}
    ports:
      - "${TEMPORAL_UI_PORT:-8233}:8080"
    depends_on:
      - temporal

  mailpit:
    image: ${MAILPIT_IMAGE:-axllent/mailpit:latest}
    environment:
      MP_MAX_MESSAGES: "5000"
      MP_DATABASE: /data/mailpit.db
    volumes:
      - mailpit-data:/data
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"   # SMTP
      - "${MAILPIT_HTTP_PORT:-8025}:8025"   # Web UI + HTTP API

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:latest}
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-chorus}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      # Exposed to provisioning/datasources/chorus.yaml as $CHORUS_PG_*; keeps
      # credentials out of the file and consistent with the postgres service.
      CHORUS_PG_USER: ${CHORUS_PG_USER:-chorus}
      CHORUS_PG_PASSWORD: ${CHORUS_PG_PASSWORD:-chorus}
      CHORUS_PG_DB: ${CHORUS_PG_DB:-chorus}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      postgres:
        condition: service_healthy

  tempo:
    image: ${TEMPO_IMAGE:-grafana/tempo:latest}
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./infrastructure/tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "${TEMPO_HTTP_PORT:-3200}:3200"   # Tempo HTTP API (read)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 3s
      retries: 10

  loki:
    image: ${LOKI_IMAGE:-grafana/loki:latest}
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./infrastructure/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/var/loki
    ports:
      - "${LOKI_HTTP_PORT:-3100}:3100"   # Loki HTTP API
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 3s
      retries: 10

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:latest}
    command:
      - --config.file=/etc/prometheus/config.yaml
      - --storage.tsdb.retention.time=24h
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./infrastructure/prometheus/config.yaml:/etc/prometheus/config.yaml:ro
      - ./infrastructure/prometheus/targets:/etc/prometheus/targets:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_HTTP_PORT:-9090}:9090"   # Prometheus UI + API
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 3s
      retries: 10

  otel-collector:
    image: ${OTEL_COLLECTOR_IMAGE:-otel/opentelemetry-collector-contrib:latest}
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./infrastructure/otel/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"          # OTLP gRPC
      - "${OTEL_HTTP_PORT:-4318}:4318"          # OTLP HTTP
      - "${OTEL_PROMETHEUS_PORT:-8889}:8889"    # Prometheus scrape target
      # Docker's fluentd logging driver runs at the host daemon level and
      # cannot resolve compose service names; it dials this host port to
      # reach the collector's fluentforward receiver.
      - "${OTEL_FLUENTD_PORT:-24224}:24224"     # fluent forward (logs)
    depends_on:
      chown-init:
        condition: service_completed_successfully
      tempo:
        condition: service_healthy
      loki:
        condition: service_healthy
      prometheus:
        condition: service_started

volumes:
  postgres-data:
  temporal-postgres-data:
  mailpit-data:
  grafana-data:
  tempo-data:
  loki-data:
  prometheus-data:
