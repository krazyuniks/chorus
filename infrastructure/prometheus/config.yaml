# Prometheus — Phase 1 local metrics backend.
#
# Two scrape paths run side by side:
#
#   1. Static jobs for backends Workstream F owns directly: Prometheus
#      itself and the OpenTelemetry Collector's prometheus exporter.
#   2. A `file_sd_configs` job for Phase 1A application services
#      (BFF, agent runtime, tool gateway, projection worker, intake
#      poller, local connectors). Each service onboards by dropping a
#      one-file target list into `infrastructure/prometheus/targets/`;
#      Prometheus picks it up without restart. See
#      `services/_template/README.md` for the per-service onboarding
#      stanza.
#
# Per ADR 0010 §6 alert rules are deferred until at least two
# end-to-end runs produce baseline numbers.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    deployment: local
    service_namespace: chorus

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']

  # Phase 1A application services. Each Workstream that adds a service
  # to `compose.yml` also drops a `<service>.yml` file under
  # `infrastructure/prometheus/targets/` declaring its `/metrics`
  # target(s). The job auto-activates as files appear; no edits to this
  # file are required.
  - job_name: chorus-services
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/*.yml
        refresh_interval: 30s
    relabel_configs:
      # Promote the per-target `service` label (set in the target file)
      # to the standard `job` and `service` labels used by the Grafana
      # dashboards.
      - source_labels: [service]
        target_label: job
