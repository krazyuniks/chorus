# Chorus — Grafana datasource provisioning (Phase 1A).
#
# Loaded automatically by Grafana on startup via the `provisioning/`
# bind-mount in compose.yml. Environment variables come from the Grafana
# service's container environment, which compose.yml populates from `.env`.
#
# Datasources land in the order the architecture review walks them:
#
#   Postgres   — read models, decision trail, tool/action audit (Workstream A).
#   Tempo      — distributed traces (OTel pipeline; ADR 0010).
#   Loki       — structured logs                 ("            ").
#   Prometheus — service + collector metrics     ("            ").
#
# The Postgres datasource stays default so panel queries that target the
# audit row remain authoritative for accountability questions; OTel-backed
# datasources answer operational ones (latency, retry rate, dependency
# health). Audit ↔ trace join is by `metadata->>'otel.trace_id'` per ADR 0010.

apiVersion: 1

datasources:
  - name: Chorus Postgres
    uid: chorus-postgres
    type: postgres
    access: proxy
    url: postgres:5432
    database: $CHORUS_PG_DB
    user: $CHORUS_PG_USER
    secureJsonData:
      password: $CHORUS_PG_PASSWORD
    jsonData:
      sslmode: disable
      postgresVersion: 1700
      timescaledb: false
    isDefault: true
    editable: false

  - name: Chorus Tempo
    uid: chorus-tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: chorus-loki
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        tags:
          - key: chorus.tenant_id
            value: tenant_id
          - key: chorus.workflow_id
            value: workflow_id
          - key: chorus.correlation_id
            value: correlation_id
        filterByTraceID: true
      tracesToMetrics:
        datasourceUid: chorus-prometheus
      serviceMap:
        datasourceUid: chorus-prometheus
      nodeGraph:
        enabled: true

  - name: Chorus Loki
    uid: chorus-loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      derivedFields:
        - matcherRegex: "trace_id=(\\w+)"
          name: TraceID
          url: "$${__value.raw}"
          datasourceUid: chorus-tempo

  - name: Chorus Prometheus
    uid: chorus-prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    editable: false
    jsonData:
      timeInterval: 15s
