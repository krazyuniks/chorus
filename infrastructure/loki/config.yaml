# Loki — Phase 1 local log backend. Monolithic mode, filesystem storage,
# 24h retention (local-only operating model — ADR 0009).

auth_enabled: false

server:
  http_listen_port: 3100
  log_level: info

common:
  ring:
    kvstore:
      store: inmemory
  replication_factor: 1
  path_prefix: /var/loki

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /var/loki/index
    cache_location: /var/loki/index_cache
  filesystem:
    directory: /var/loki/chunks

limits_config:
  retention_period: 24h
  allow_structured_metadata: true

compactor:
  working_directory: /var/loki/compactor
  retention_enabled: true
  delete_request_store: filesystem
