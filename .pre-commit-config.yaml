# prek configuration (pre-commit-compatible).
#
# Built-in Rust-native hooks run instantly without environment setup.
# Project hooks run via `language: system` so they share the developer's
# uv environment and the existing just recipes.
#
#   prek install           # register git hooks (run once)
#   prek run --all-files   # run every hook against the whole tree

repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      - id: just-lint
        name: just lint
        entry: just lint
        language: system
        types: [python]
        pass_filenames: false

      - id: just-contracts-check
        name: just contracts-check
        entry: just contracts-check
        language: system
        always_run: true
        pass_filenames: false

      - id: validate-contract-json
        name: validate contract JSON files parse
        entry: python3 -c "import json,sys,pathlib; [json.loads(p.read_text()) for p in pathlib.Path('contracts').rglob('*.json')]"
        language: system
        files: ^contracts/.*\.json$
        pass_filenames: false
